name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deno-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Run tests
        run: deno task test
