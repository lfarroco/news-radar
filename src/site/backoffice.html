<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>News Radar - Backoffice</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="/styles.css" />
</head>
<body>
	<div class="app-shell">
		<header class="topbar">
			<div class="brand-block">
				<h1>News Radar Backoffice</h1>
				<p>Route-based workspace for editorial operations</p>
			</div>
			<nav class="topnav" aria-label="Backoffice routes">
				<a href="/" data-link="internal" id="nav-home">Dashboard</a>
				<a href="/topics" data-link="internal" id="nav-topics">Topics</a>
				<a href="/articles" data-link="internal" id="nav-articles">Articles</a>
			</nav>
			<div class="header-actions">
				<button class="btn btn-primary" id="run-pipeline-btn">Run Pipeline</button>
				<button class="btn btn-secondary" id="compile-website-btn">Compile Website</button>
				<button class="btn btn-secondary" id="run-scout-btn">Scout Sources</button>
			</div>
		</header>

		<main class="workspace">
			<section class="page-head">
				<h2 id="page-title">Dashboard</h2>
				<p id="page-subtitle">Overview of topics, articles, and operational shortcuts.</p>
			</section>
			<section id="route-view" class="route-view" aria-live="polite"></section>
		</main>

		<footer class="status-bar">
			<div id="status-message" class="status-message"></div>
		</footer>
	</div>

	<script src="/app.js" defer></script>
</body>
</html>
